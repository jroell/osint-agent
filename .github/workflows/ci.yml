name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ts:
    name: TypeScript (Bun)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: osint
          POSTGRES_PASSWORD: osint
          POSTGRES_DB: osint_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U osint -d osint_dev"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://osint:osint@localhost:5432/osint_dev?sslmode=disable
      REDIS_URL: redis://localhost:6379
      FIREBASE_PROJECT_ID: osint-agent-ci
      ANTHROPIC_API_KEY: sk-ant-ci-placeholder
      STRIPE_SECRET_KEY: sk_test_ci
      STRIPE_WEBHOOK_SECRET: whsec_ci
      STRIPE_PRICE_ID_HUNTER: price_hunter_ci
      STRIPE_PRICE_ID_OPERATOR: price_operator_ci
      GO_WORKER_URL: http://localhost:8081
      PY_WORKER_URL: http://localhost:8082
      WORKER_SIGNING_KEY_HEX: "0101010101010101010101010101010101010101010101010101010101010101"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.x
      - name: Skip if no TS workspace members
        id: skip
        shell: bash
        run: |
          # Skip the TS lane until at least one workspace package exists.
          # Robust across partial-glob cases (apps/* may exist while packages/* is empty).
          shopt -s nullglob
          matches=( apps/*/package.json packages/*/package.json )
          if (( ${#matches[@]} > 0 )); then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - run: bun install --frozen-lockfile
        if: steps.skip.outputs.exists == 'true' && hashFiles('bun.lock') != ''
      - run: bun install
        if: steps.skip.outputs.exists == 'true' && hashFiles('bun.lock') == ''
      - name: Install dbmate
        if: steps.skip.outputs.exists == 'true' && hashFiles('apps/api/src/db/migrations/*.sql') != ''
        run: |
          curl -fsSL -o /usr/local/bin/dbmate https://github.com/amacneil/dbmate/releases/latest/download/dbmate-linux-amd64
          chmod +x /usr/local/bin/dbmate
      - name: Run migrations
        if: steps.skip.outputs.exists == 'true' && hashFiles('apps/api/src/db/migrations/*.sql') != ''
        run: bun run db:migrate
      - run: bun run lint
        if: steps.skip.outputs.exists == 'true'
      - run: bun run test
        if: steps.skip.outputs.exists == 'true'
      - run: bun run build
        if: steps.skip.outputs.exists == 'true' && hashFiles('apps/api/src/index.ts') != ''

  go:
    name: Go worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Skip if go-worker not present
        id: skip
        run: |
          if [ -f apps/go-worker/go.mod ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - working-directory: apps/go-worker
        if: steps.skip.outputs.exists == 'true'
        run: go test ./...
      - working-directory: apps/go-worker
        if: steps.skip.outputs.exists == 'true'
        run: go build ./...

  py:
    name: Python worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v3
      - name: Skip if py-worker not present
        id: skip
        run: |
          if [ -f apps/py-worker/pyproject.toml ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      # pycairo (transitive dep: maigret → xhtml2pdf → svglib → rlpycairo → pycairo)
      # needs cairo system libs at build time. Without these, `uv sync` fails with
      # "Dependency 'cairo' not found (tried pkg-config and cmake)".
      - name: Install cairo system libs
        if: steps.skip.outputs.exists == 'true'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libcairo2-dev pkg-config
      - working-directory: apps/py-worker
        if: steps.skip.outputs.exists == 'true'
        run: uv sync --all-extras
      - working-directory: apps/py-worker
        if: steps.skip.outputs.exists == 'true'
        run: uv run pytest
