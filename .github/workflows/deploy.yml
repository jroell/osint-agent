name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Forks (and the canonical repo before the FLY_API_TOKEN secret is configured)
# don't have a Fly token. Each step soft-skips with `exit 0` when the token is
# missing so this workflow goes green for community forks and only actually
# deploys when the operator has populated the secret.
jobs:
  deploy-go-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - working-directory: apps/go-worker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "FLY_API_TOKEN not set — skipping deploy (set the secret in repo settings to enable)."
            exit 0
          fi
          flyctl deploy --remote-only

  deploy-py-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - working-directory: apps/py-worker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "FLY_API_TOKEN not set — skipping deploy (set the secret in repo settings to enable)."
            exit 0
          fi
          flyctl deploy --remote-only

  deploy-api:
    runs-on: ubuntu-latest
    needs: [deploy-go-worker, deploy-py-worker]
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # api Dockerfile depends on packages/shared-types at repo root, so deploy
      # from repo root with --config pointing at the app's fly.toml (build
      # context defaults to the directory containing the config file unless
      # --build-context overrides it).
      - env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "FLY_API_TOKEN not set — skipping deploy (set the secret in repo settings to enable)."
            exit 0
          fi
          flyctl deploy --remote-only --config apps/api/fly.toml --build-context .
