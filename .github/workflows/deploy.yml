name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-go-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        working-directory: apps/go-worker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-py-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        working-directory: apps/py-worker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-api:
    runs-on: ubuntu-latest
    needs: [deploy-go-worker, deploy-py-worker]
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # api Dockerfile depends on packages/shared-types at repo root, so deploy
      # from repo root with --config pointing at the app's fly.toml (build
      # context defaults to the directory containing the config file unless
      # --build-context overrides it).
      - run: flyctl deploy --remote-only --config apps/api/fly.toml --build-context .
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
