app = "osint-py-worker"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8082"

[http_service]
  internal_port = 8082
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[[http_service.checks]]
  grace_period = "15s"
  interval = "30s"
  method = "GET"
  path = "/healthz"
  timeout = "5s"
